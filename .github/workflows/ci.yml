name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Go ${{ matrix.go-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        go-version:
          - "1.24.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Format Check
        run: test -z "$(gofmt -l ./cmd ./internal)"
        shell: bash

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/anng
