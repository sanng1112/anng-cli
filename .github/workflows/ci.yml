name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node-version:
          - "20"
          - "22"
          - "24"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck + Lint + Format Check
        run: npm run check

      - name: Bundle
        run: npm run bundle

      - name: Test
        run: npm test
